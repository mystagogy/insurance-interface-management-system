spring:
  application:
    name: insurance-interface
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/insurance_interface?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:insurance_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

external:
  car-insurance-contract:
    base-url: ${CAR_INSURANCE_CONTRACT_API_BASE_URL:http://apis.data.go.kr/1160100/service/GetFPAtmbInsujoinInfoService}
    service-key: ${CAR_INSURANCE_API_SERVICE_KEY:}
    timeout-ms: ${CAR_INSURANCE_CONTRACT_TIMEOUT_MS:5000}
    num-of-rows: ${CAR_INSURANCE_CONTRACT_NUM_OF_ROWS:300}
